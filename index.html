<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>JAGM IT Company — Dashboard</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --panel: rgba(17, 24, 39, 0.85);
      --border: rgba(148, 163, 184, 0.15);
      --text: #e8eef5;
      --muted: #8b9bb4;
      --accent: #6ee7ff;
      --accent2: #a78bfa;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #fb7185;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-weight: 800; font-size: 0.7rem; color: #0a0f1a;
      letter-spacing: 0.05em;
    }
    .brand h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }
    .brand p { font-size: 0.82rem; color: var(--muted); }
    .updated { font-size: 0.82rem; color: var(--muted); text-align: right; }
    .updated .live-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--good); margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Metrics row */
    .metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .metric {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: border-color 0.2s;
    }
    .metric:hover { border-color: rgba(110, 231, 255, 0.3); }
    .metric .label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 8px;
    }
    .metric .value { font-size: 1.8rem; font-weight: 800; }
    .metric .note { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
    .metric .value.good { color: var(--good); }
    .metric .value.warn { color: var(--warn); }
    .metric .value.bad { color: var(--bad); }
    .metric .value.accent { color: var(--accent); }

    /* Section */
    .section { margin-bottom: 28px; }
    .section-title {
      font-size: 1rem; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; width: 3px; height: 18px; border-radius: 2px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }

    /* Repo table */
    .repo-grid { display: grid; gap: 10px; }
    .repo-row {
      display: grid; grid-template-columns: 1fr auto auto;
      align-items: center; gap: 12px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      transition: border-color 0.2s;
    }
    .repo-row:hover { border-color: rgba(110, 231, 255, 0.25); }
    .repo-name { font-weight: 700; }
    .repo-name a { color: var(--accent); text-decoration: none; }
    .repo-name a:hover { text-decoration: underline; }
    .repo-name .full { color: var(--muted); font-weight: 400; font-size: 0.82rem; margin-left: 8px; }
    .badge {
      padding: 4px 12px; border-radius: 999px; font-size: 0.78rem; font-weight: 700;
      white-space: nowrap;
    }
    .badge.good { background: rgba(52, 211, 153, 0.12); color: var(--good); }
    .badge.warn { background: rgba(251, 191, 36, 0.12); color: var(--warn); }
    .badge.bad { background: rgba(251, 113, 133, 0.12); color: var(--bad); }
    .badge.muted { background: rgba(148, 163, 184, 0.1); color: var(--muted); }

    /* Agents */
    .agent-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .agent-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }
    .agent-card .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--good); flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.15);
    }
    .agent-card .name { font-size: 0.85rem; font-weight: 600; }

    /* Departments */
    .dept-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .dept-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .dept-card .dept-id {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--accent); font-weight: 700; margin-bottom: 4px;
    }
    .dept-card .dept-name { font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; }
    .dept-card .dept-head { font-size: 0.8rem; color: var(--muted); }

    /* C-Level */
    .clevel-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .clevel-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .clevel-card .role { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .clevel-card .focus { font-size: 0.8rem; color: var(--muted); }
    .clevel-card .agent { font-size: 0.78rem; color: var(--accent); margin-top: 6px; }

    /* Projects */
    .project-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .project-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .project-card .pname { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .project-card .pphase { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .project-card .pstatus {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    }
    .pstatus.active { background: rgba(110, 231, 255, 0.12); color: var(--accent); }
    .pstatus.deployed { background: rgba(52, 211, 153, 0.12); color: var(--good); }

    /* Footer */
    .footer {
      text-align: center; color: var(--muted); font-size: 0.8rem;
      padding-top: 24px; border-top: 1px solid var(--border); margin-top: 12px;
    }

    @media (max-width: 640px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .repo-row { grid-template-columns: 1fr; gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="logo">JAGM</div>
        <div>
          <h1>JAGM IT Company</h1>
          <p>AI-SDLC Team Dashboard</p>
        </div>
      </div>
      <div class="updated">
        <span class="live-dot"></span>
        <span id="updatedAt">—</span>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics" id="metrics"></div>

    <!-- Repos -->
    <div class="section">
      <div class="section-title">Репозиторії</div>
      <div class="repo-grid" id="repoList"></div>
    </div>

    <!-- Projects -->
    <div class="section">
      <div class="section-title">Проєкти</div>
      <div class="project-grid" id="projectList"></div>
    </div>

    <!-- C-Level -->
    <div class="section">
      <div class="section-title">C-Level Team</div>
      <div class="clevel-grid" id="clevelList"></div>
    </div>

    <!-- Departments -->
    <div class="section">
      <div class="section-title">Департаменти</div>
      <div class="dept-grid" id="deptList"></div>
    </div>

    <!-- Agents -->
    <div class="section">
      <div class="section-title">Живі агенти (Letta Server)</div>
      <div class="agent-grid" id="agentList"></div>
    </div>

    <div class="footer">
      JAGM IT Company · Дані оновлюються автоматично · <a href="https://github.com/jagmstar/JagmITCompany-dashboard" style="color:var(--accent);text-decoration:none;">GitHub</a>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function fmt(n) { return new Intl.NumberFormat('uk-UA').format(n ?? 0); }
    function timeAgo(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return new Intl.DateTimeFormat('uk-UA', { dateStyle: 'short', timeStyle: 'short', timeZone: 'UTC' }).format(d) + ' UTC';
    }
    function issueTone(n) { if (n >= 100) return 'bad'; if (n >= 1) return 'warn'; return 'good'; }

    function render(data) {
      const s = data.summary || {};
      const repos = data.repos || [];
      const agents = data.agents || [];
      const depts = data.departments || [];
      const clevel = data.cLevel || [];
      const projects = data.projects || [];

      $('updatedAt').textContent = 'Оновлено: ' + timeAgo(data.generatedAt);

      // Metrics
      const metrics = [
        { label: 'Репозиторії', value: fmt(s.repos ?? repos.length), note: 'компанія', cls: 'accent' },
        { label: 'Відкриті тікети', value: fmt(s.openIssues ?? 0), note: 'з ' + fmt(s.totalIssues ?? 0) + ' total', cls: s.openIssues > 50 ? 'bad' : s.openIssues > 0 ? 'warn' : 'good' },
        { label: 'Живі агенти', value: fmt(s.liveAgents ?? agents.length), note: 'Letta server', cls: 'good' },
        { label: 'Ролі', value: fmt(s.roleProfiles ?? 0), note: 'профілі', cls: 'accent' },
        { label: 'Департаменти', value: fmt(s.departments ?? depts.length), note: 'команд', cls: 'accent' },
        { label: 'Виручка', value: s.revenueLabel || '$0', note: s.statusUk || 'pre-revenue', cls: 'warn' },
        { label: 'Клієнти', value: fmt(s.clients ?? 0), note: 'paid', cls: s.clients > 0 ? 'good' : 'warn' },
        { label: 'Бюджет', value: '$' + fmt(s.budget ?? 0), note: 'zero-cost', cls: 'muted' },
      ];
      $('metrics').innerHTML = metrics.map(m => `
        <div class="metric">
          <div class="label">${m.label}</div>
          <div class="value ${m.cls}">${m.value}</div>
          <div class="note">${m.note}</div>
        </div>
      `).join('');

      // Repos
      $('repoList').innerHTML = repos.map(r => `
        <div class="repo-row">
          <div class="repo-name">
            <a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
            <span class="full">${r.url.replace('https://github.com/', '')}</span>
          </div>
          <span class="badge ${issueTone(r.openIssues)}">${fmt(r.openIssues)} open</span>
          <span class="badge muted">${fmt(r.totalIssues)} total</span>
        </div>
      `).join('');

      // Projects
      $('projectList').innerHTML = projects.map(p => `
        <div class="project-card">
          <div class="pname">${p.name}</div>
          <div class="pphase">${p.phase}</div>
          <span class="pstatus ${p.status}">${p.status}</span>
        </div>
      `).join('');

      // C-Level
      $('clevelList').innerHTML = clevel.map(c => `
        <div class="clevel-card">
          <div class="role">${c.role}</div>
          <div class="focus">${c.focus}</div>
          <div class="agent">${c.agent}</div>
        </div>
      `).join('');

      // Departments
      $('deptList').innerHTML = depts.map(d => `
        <div class="dept-card">
          <div class="dept-id">${d.id}</div>
          <div class="dept-name">${d.name}</div>
          <div class="dept-head">Head: ${d.head}</div>
        </div>
      `).join('');

      // Agents
      $('agentList').innerHTML = agents.map(a => `
        <div class="agent-card">
          <span class="dot"></span>
          <span class="name">${a}</span>
        </div>
      `).join('');
    }

    async function load() {
      try {
        const res = await fetch('./data.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        render(await res.json());
      } catch (e) {
        $('updatedAt').textContent = 'Помилка завантаження: ' + e.message;
      }
    }

    load();
    // Auto-refresh every 5 minutes
    setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
