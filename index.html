<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>JAGM IT Company — Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;padding:20px;min-height:100vh}
h1{font-size:22px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.subtitle{color:#6b7280;font-size:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.card{background:#111827;border-radius:10px;padding:16px;border:1px solid #1f2937}
.card h2{font-size:14px;margin-bottom:10px;color:#f1f5f9;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px;font-size:10px;color:#4b5563;text-transform:uppercase;border-bottom:1px solid #1f2937}
td{padding:6px;border-bottom:1px solid #111827;font-size:12px}
.live{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.full{grid-column:1/-1}
.green{color:#22c55e}.red{color:#ef4444}.gray{color:#6b7280}.yellow{color:#f59e0b}.blue{color:#60a5fa}
.timestamp{color:#4b5563;font-size:11px;margin-top:8px}
.loading{color:#6b7280;font-size:13px;padding:20px;text-align:center}
.commit{padding:5px 0;border-bottom:1px solid #111827;font-size:12px}
.commit .repo{color:#60a5fa;font-weight:600;margin-right:8px}
.commit .msg{color:#9ca3af}
.agent-msg{color:#9ca3af;font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<h1><span class="live"></span>JAGM IT Company — Live Operations</h1>
<div class="subtitle" id="updated">Loading...</div>
<div id="content"><div class="loading">Loading live data...</div></div>
<div class="timestamp">Powered by Letta · Ollama qwen2.5:7b · Zero cost · Auto-refresh 30s</div>

<script>
async function loadData(){
  try{
    const t = Date.now();
    const res = await fetch(`live-status.json?t=${t}`,{cache:'no-store'});
    const data = await res.json();
    
    document.getElementById('updated').textContent = 
      `Last updated: ${data.generated_at || 'unknown'} · ${data.agents?.length || 0} agents · ${data.repos?.length || 0} repos · ${data.commits?.length || 0} recent commits`;

    let html = '<div class="grid">';
    
    // Agents
    html += '<div class="card"><h2>👥 Digital Twins</h2><table>';
    html += '<tr><th>Agent</th><th>Status</th><th>Last Response</th><th>Time</th></tr>';
    (data.agents||[]).forEach(a=>{
      const color = a.status==='responded'?'green':'gray';
      const icon = a.status==='responded'?'✅':'⏳';
      const msg = (a.last_message||'—').replace(/</g,'&lt;').substring(0,120);
      const time = (a.last_response||'').substring(0,19);
      html += `<tr><td style="font-weight:600">${a.name}</td><td class="${color}">${icon}</td><td class="agent-msg">${msg}</td><td class="gray" style="font-size:10px">${time}</td></tr>`;
    });
    html += '</table></div>';

    // Repos
    html += '<div class="card"><h2>📁 Projects</h2><table>';
    html += '<tr><th>Repo</th><th>Issues</th><th>Last Commit</th></tr>';
    (data.repos||[]).forEach(r=>{
      const ic = r.open_issues>0?'red':'green';
      const commit = (r.last_commit||'—').replace(/</g,'&lt;').substring(0,80);
      html += `<tr><td><a href="${r.url}" class="blue">${r.name}</a></td><td class="${ic}">${r.open_issues} open</td><td class="gray" style="font-size:11px">${commit}</td></tr>`;
    });
    html += '</table></div>';

    // Commits
    html += '<div class="card full"><h2>🔄 Recent Activity</h2>';
    (data.commits||[]).forEach(c=>{
      const text = (c.commit||'').replace(/</g,'&lt;');
      html += `<div class="commit"><span class="repo">${c.repo}</span><span class="msg">${text}</span></div>`;
    });
    if(!(data.commits||[]).length) html += '<div class="gray">No recent activity</div>';
    html += '</div>';

    html += '</div>';
    document.getElementById('content').innerHTML = html;
  }catch(e){
    document.getElementById('content').innerHTML = `<div class="loading red">Error loading: ${e.message}</div>`;
  }
}
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
